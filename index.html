<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Curriculum Map</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .course { margin: 10px; padding: 10px; border: 1px solid #ccc; }
        .prerequisites { color: gray; }
    </style>
</head>
<body>
    <h1>Interactive Curriculum Map</h1>
    <div id="curriculum-map"></div>

    <script>
        const courses = [
            { name: 'Course 101', credits: 3, prerequisites: [] },
            { name: 'Course 102', credits: 4, prerequisites: ['Course 101'] },
            { name: 'Course 201', credits: 3, prerequisites: ['Course 102'] }
        ];

        const mapContainer = document.getElementById('curriculum-map');

        courses.forEach(course => {
            const courseDiv = document.createElement('div');
            courseDiv.classList.add('course');
            courseDiv.innerHTML = `<strong>${course.name}</strong> (${course.credits} credits)<br>`;

            if (course.prerequisites.length > 0) {
                courseDiv.innerHTML += `<span class='prerequisites'>Prerequisites: ${course.prerequisites.join(', ')}</span>`;
            }

            mapContainer.appendChild(courseDiv);
        });
    </script>
</body>
</html>
